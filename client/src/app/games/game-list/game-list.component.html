<div class="game-list-container">
  <div class="list-header">
    <h1>Games</h1>
    <a routerLink="/games/new" class="btn-primary">Add Game</a>
  </div>

  <div *ngIf="error" class="error-banner">{{ error }}</div>

  <div *ngIf="isLoading" class="loading">Loading...</div>

  <div *ngIf="!isLoading && !error && games.length === 0" class="empty-state">
    No games yet. Add one to get started.
  </div>

  <div class="game-grid" *ngIf="!isLoading && !error && games.length > 0">
    <div class="game-card" *ngFor="let game of games">
      <div class="game-card-header">
        <h2>{{ game.name }}</h2>
        <div class="game-card-actions">
          <a [routerLink]="['/games', game.id, 'edit']">Edit</a>
          <button type="button" (click)="onDelete(game.id)">
            Delete
          </button>
        </div>
      </div>

      <p *ngIf="game.description" class="game-description">
        {{ game.description }}
      </p>

      <div class="game-stats">
        <div class="stat">
          <span class="stat-label">Decks</span>
          <span class="stat-value">{{ game.totalDecks }}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value">{{ game.winRate | percent }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
